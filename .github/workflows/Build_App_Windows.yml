name: Build NexCode IDE (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # `pack` đã bao gồm build bên trong: npm run build && node scripts/pack-installer.mjs
      # Không cần chạy `npm run build` riêng nữa để tránh build 2 lần
      - name: Package Electron app (NSIS installer)
        run: npm run pack
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: NexCode-IDE-Windows
          path: dist/pack-out/*.exe   # ← output dir theo electron-builder.config
          retention-days: 7