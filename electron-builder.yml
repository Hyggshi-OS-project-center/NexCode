# electron-builder.yml — file associations use unique ProgIDs from scripts/file-associations.cjs
appId: com.nexcode.ide
productName: NexCode IDE
icon: build/icon.ico
npmRebuild: false
asar: true
afterPack: ./scripts/after-pack.cjs

directories:
  output: dist/pack-out
  buildResources: build

extraResources:
  - from: build/icon.ico
    to: icon.ico
  - from: src/renderer/public/insider-icon.ico
    to: insider-icon.ico

files:
  - dist/main/**/*
  - dist/agents/**/*
  - dist/renderer/**/*
  - dist/shared/**/*
  - package.json

win:
  icon: icon.ico
  executableName: NexCode IDE
  signAndEditExecutable: false
  target:
    - target: portable
      arch:
        - x64
        - arm64
        - ia32
    - target: nsis
      arch:
        - x64
        - arm64
        - ia32

portable:
  artifactName: "${productName}-${version}-portable.${ext}"

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  artifactName: "${productName}-${version}-setup.${ext}"
  shortcutName: NexCode IDE
  installerIcon: icon.ico
  uninstallerIcon: icon.ico
  installerHeaderIcon: icon.ico
  license: LICENSE
  include: scripts/installer.nsh

linux:
  icon: build/icon.png
  category: Development
  executableName: nexcode-ide
  artifactName: "${productName}-${version}-${arch}.${ext}"
  maintainer: "Hyggshi OS major project center <hyggshidev@gmail.com>"
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
    - target: tar.gz
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

deb:
  packageCategory: devel
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - libasound2

fileAssociations:
  - ext: js
    name: NexCodeIDE.JavaScript
    description: JavaScript Source File
    icon: win32/javascript.ico
  - ext: mjs
    name: NexCodeIDE.JavaScript
    description: JavaScript Source File
    icon: win32/javascript.ico
  - ext: cjs
    name: NexCodeIDE.JavaScript
    description: JavaScript Source File
    icon: win32/javascript.ico
