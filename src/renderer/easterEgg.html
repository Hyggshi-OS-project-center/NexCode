<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:;" />
  <title>NexCode Easter Egg</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1e1e1e;

      /* Center image */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .momoi {
      display: block;

      width: 100px;
      height: 100px;

      object-fit: contain;
      object-position: center;

      /* Prevent image stretching */
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>

<body>
  <img id="momoi" class="momoi" alt="Momoi" />
  <script type="module" src="./easterEgg.ts"></script>
</body>
</html>
